    async function uploadImageFiles(fileList) {
      const files = Array.from(fileList || []).filter(Boolean);
      if (!files.length) return;
      let lastCreatedId = null;
      await runImageAction(`Uploading ${files.length} image${files.length === 1 ? '' : 's'}…`, `${files.length} image${files.length === 1 ? '' : 's'} uploaded.`, async () => {
        for (const file of files) {
          const form = new FormData();
          form.append('file', file);
          form.append('title', file.name.replace(/\.[^.]+$/, ''));
          form.append('image_type', state.filters.image_type || 'reference');
          const created = await api('/api/images', {
            method: 'POST',
            body: form
          });
          lastCreatedId = created?.id || lastCreatedId;
        }
        state.imageCache = {};
        await loadImages();
        if (lastCreatedId) {
          await selectImage(Number(lastCreatedId), { preferCache: false, preserveView: false });
        }
      });
      const input = el('image-upload-input');
      if (input) input.value = '';
    }

    async function batchMatchCurrentImageRegionsToKits() {
      const image = state.selectedImage;
      if (!image) return;
      const regions = Array.isArray(image.regions) ? image.regions : [];
      const candidates = regions.filter((region) => (region.label || '').trim());
      if (!candidates.length) {
        setImageActionStatus('error', 'This image has no labeled regions to match.');
        return;
      }
      await runImageAction('Matching region labels to kits…', (result) => {
        if (!result) return 'Kit matching finished.';
        return `Matched ${result.matched} labels. Skipped ${result.skipped}. Ambiguous ${result.ambiguous}.`;
      }, async () => {
        let matched = 0;
        let skipped = 0;
        let ambiguous = 0;
        for (const region of candidates) {
          const label = (region.label || '').trim();
          if (!label) {
            skipped += 1;
            continue;
          }
          if (region.entity_type && region.entity_id) {
            skipped += 1;
            continue;
          }
          const payload = await api(`/api/kits?q=${encodeURIComponent(label)}`);
          const kits = Array.isArray(payload) ? payload : (payload?.data || []);
          const match = autoKitMatchCandidate(label, kits);
          if (!match.candidate) {
            if (match.ranked.length) ambiguous += 1;
            else skipped += 1;
            continue;
          }
          await api(`/api/image_regions/${region.id}`, {
            method: 'PUT',
            headers: authHeaders(),
            body: JSON.stringify({
              image_id: region.image_id,
              region_type: region.region_type,
              x_norm: region.x_norm,
              y_norm: region.y_norm,
              width_norm: region.width_norm,
              height_norm: region.height_norm,
              pixel_x: region.pixel_x,
              pixel_y: region.pixel_y,
              pixel_width: region.pixel_width,
              pixel_height: region.pixel_height,
              label: region.label,
              notes: region.notes,
              entity_type: 'kit',
              entity_id: match.candidate.id,
              source_extract_id: region.source_extract_id,
              attributed_to: region.attributed_to
            })
          });
          matched += 1;
        }
        delete state.imageCache[image.id];
        await selectImage(image.id, { preferCache: false, preserveView: true });
        return { matched, skipped, ambiguous };
      });
    }

    async function searchFamilies(query) {
      state.familySearch = query.trim();
      const token = ++state.familySearchToken;
      if (state.familySearch.length < 2) {
        state.familyResults = [];
        renderFamilySearchResults();
        return;
      }
      const payload = await api(`/api/image_families?q=${encodeURIComponent(state.familySearch)}`);
      if (token !== state.familySearchToken) return;
      state.familyResults = Array.isArray(payload) ? payload : (payload?.data || []);
      renderFamilySearchResults();
    }

    async function createFamilyFromCurrentImage() {
      const image = state.selectedImage;
      if (!image) return;
      if (image.family?.id) {
        setFamilyActionStatus('error', `This image already belongs to family "${image.family.title || image.family.id}".`);
        return;
      }
      const title = el('new-family-title')?.value?.trim();
      if (!title) {
        setFamilyActionStatus('error', 'Group title is required.');
        return;
      }
      await runFamilyAction('Creating group…', (created) => `Created group "${title}".`, async () => {
        const created = await api('/api/image_families', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            title,
            family_type: 'reference_set',
            primary_image_id: image.id,
            members: [{
              image_id: image.id,
              relation_type: 'primary',
              is_primary: 1,
              is_hidden_in_library: 0,
              coverage_role: 'full_frame'
            }]
          })
        });
        state.familySearch = '';
        state.familyResults = [];
        await refreshImageAfterFamilyMutation();
        return created;
      });
    }

    async function addCurrentImageToFamily(familyId) {
      const image = state.selectedImage;
      if (!image) return;
      if (image.family?.id === familyId) {
        setFamilyActionStatus('success', 'This image is already in that group.');
        return;
      }
      const relationType = 'variant';
      await runFamilyAction('Adding image to group…', 'Image added to group.', async () => {
        await api(`/api/image_families/${familyId}/members`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            image_id: image.id,
            relation_type: relationType,
            is_primary: relationType === 'primary' ? 1 : 0,
            coverage_role: defaultCoverageRoleForRelation(relationType)
          })
        });
        state.familySearch = '';
        state.familyResults = [];
        await refreshImageAfterFamilyMutation();
      });
    }

    async function saveCurrentFamily() {
      const image = state.selectedImage;
      const family = image?.family;
      if (!image || !family) return;
      const title = el('family-title')?.value?.trim();
      if (!title) {
        setFamilyActionStatus('error', 'Group title is required.');
        return;
      }
      await runFamilyAction('Saving group…', 'Group updated.', async () => {
        await api(`/api/image_families/${family.id}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({
            title,
            family_type: family.family_type || 'reference_set'
          })
        });
        await refreshImageAfterFamilyMutation();
      });
    }

    async function saveCurrentFamilyMember() {
      const image = state.selectedImage;
      const family = image?.family;
      const member = currentEditableFamilyMember(image);
      if (!image || !family || !member) return;
      const isPrimary = el('family-member-default')?.checked ? 1 : 0;
      const relationType = isPrimary ? 'primary' : 'variant';
      await runFamilyAction('Saving group image…', 'Group image updated.', async () => {
        await api(`/api/image_families/${family.id}/members/${member.id || member.family_member_id}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({
            relation_type: relationType,
            is_primary: isPrimary,
            coverage_role: defaultCoverageRoleForRelation(relationType)
          })
        });
        await refreshImageAfterFamilyMutation();
      });
    }

    async function removeCurrentImageFromFamily() {
      const image = state.selectedImage;
      const family = image?.family;
      const member = currentEditableFamilyMember(image);
      if (!image || !family || !member) return;
      await runFamilyAction('Removing image from group…', 'Image removed from group.', async () => {
        await api(`/api/image_families/${family.id}/members/${member.id || member.family_member_id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        if (Number(member.image_id) !== Number(image.id)) {
          state.familyEditorMemberId = null;
        }
        await refreshImageAfterFamilyMutation();
      });
    }

    async function removeFamilyMemberById(memberId) {
      const image = state.selectedImage;
      const family = image?.family;
      const member = family?.members?.find((item) => Number(item.id || item.family_member_id) === Number(memberId));
      if (!image || !family || !member) return;
      state.familyEditorMemberId = Number(memberId);
      await removeCurrentImageFromFamily();
    }

    async function deleteCurrentFamily() {
      const image = state.selectedImage;
      const family = image?.family;
      if (!image || !family) return;
      await runFamilyAction('Deleting group…', 'Group deleted.', async () => {
        await api(`/api/image_families/${family.id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        await refreshImageAfterFamilyMutation();
      });
    }

    async function loadKitSuggestions(region) {
      const label = (region?.label || '').trim();
      if (label.length < 2) {
        state.kitSuggestions = [];
        renderKitSuggestions();
        return;
      }
      const payload = await api(`/api/kits?q=${encodeURIComponent(label)}`);
      const kits = Array.isArray(payload) ? payload : (payload?.data || []);
      state.kitSuggestions = rankKitMatches(label, kits).slice(0, 6);
      renderKitSuggestions();
    }

    function bindImageInspector(image) {
      document.querySelectorAll('[data-open-region]').forEach((node) => {
        node.addEventListener('click', async () => selectRegion(Number(node.dataset.openRegion)));
      });
      document.querySelectorAll('[data-open-image]').forEach((node) => {
        node.addEventListener('mousedown', (event) => {
          event.preventDefault();
        });
        node.addEventListener('click', async (event) => {
          event.stopPropagation();
          await selectImage(Number(node.dataset.openImage), { preferCache: true, preserveView: false });
        });
      });
      document.querySelectorAll('[data-edit-family-member]').forEach((node) => {
        node.addEventListener('mousedown', (event) => {
          event.preventDefault();
        });
        node.addEventListener('click', async () => {
          await setFamilyEditorMember(node.dataset.editFamilyMember);
        });
      });
      document.querySelectorAll('[data-remove-family-member]').forEach((node) => {
        node.addEventListener('mousedown', (event) => {
          event.preventDefault();
        });
        node.addEventListener('click', (event) => {
          event.stopPropagation();
          removeFamilyMemberById(node.dataset.removeFamilyMember);
        });
      });
      el('create-family')?.addEventListener('click', () => createFamilyFromCurrentImage());
      el('save-family')?.addEventListener('click', () => saveCurrentFamily());
      el('delete-family')?.addEventListener('click', () => deleteCurrentFamily());
      el('family-member-default')?.addEventListener('change', () => saveCurrentFamilyMember());
      el('save-image')?.addEventListener('click', () => saveCurrentImageMetadata());
      el('delete-image')?.addEventListener('click', () => deleteCurrentImage());
      el('match-image-kits')?.addEventListener('click', () => batchMatchCurrentImageRegionsToKits());
      el('family-search')?.addEventListener('input', debounce((event) => {
        searchFamilies(event.target.value).catch(handleError);
      }, 220));
      el('kit-browser-search')?.addEventListener('input', debounce(async (event) => {
        state.kitBrowserSearch = event.target.value.trim();
        const token = ++state.kitBrowserToken;
        if (state.kitBrowserSearch.length < 2) {
          state.kitBrowserResults = [];
          renderKitBrowserResults();
          return;
        }
        const payload = await api(`/api/kits?q=${encodeURIComponent(state.kitBrowserSearch)}`);
        if (token !== state.kitBrowserToken) return;
        state.kitBrowserResults = Array.isArray(payload) ? payload : (payload?.data || []);
        renderKitBrowserResults();
      }, 220));
      renderKitBrowserResults();
      renderFamilySearchResults();
    }

    async function loadRegionDetail(regionId) {
      const payload = await api(`/api/image_regions/${regionId}`);
      const region = payload.region || payload;
      region.history = payload.history || region.history || [];
      region.claims = payload.claims || region.claims || [];
      region.claim_count = Array.isArray(region.claims) ? region.claims.length : (region.claim_count || 0);
      if (region.entity_type && region.entity_id && !region.entity_label) {
        region.entity_label = `${region.entity_type} ${region.entity_id}`;
      }
      patchRegionIntoSelectedImage(region);
      return region;
    }

    async function updateRegion(region) {
      const payload = {
        image_id: region.image_id,
        region_type: region.region_type,
        x_norm: region.x_norm,
        y_norm: region.y_norm,
        width_norm: region.width_norm,
        height_norm: region.height_norm,
        pixel_x: region.pixel_x,
        pixel_y: region.pixel_y,
        pixel_width: region.pixel_width,
        pixel_height: region.pixel_height,
        label: region.label,
        notes: region.notes,
        entity_type: region.entity_type,
        entity_id: region.entity_id,
        source_extract_id: region.source_extract_id,
        attributed_to: region.attributed_to
      };
      await api(`/api/image_regions/${region.id}`, {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      const refreshed = await loadRegionDetail(region.id);
      state.selectedRegionId = region.id;
      state.selectedRegionDetail = refreshed;
      renderImageList();
      renderWorkspace();
    }

    async function saveRegionEdits() {
      const region = currentRegionDetail();
      if (!region) return;
      await updateRegion({
        ...region,
        label: el('region-label').value.trim() || null,
        notes: el('region-notes').value.trim() || null
      });
    }

    async function deleteSelectedRegion() {
      const region = currentRegionDetail();
      if (!region) return;
      await api(`/api/image_regions/${region.id}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      removeRegionFromSelectedImage(region.id);
      syncLibraryRowFromSelectedImage();
      cacheSelectedImage();
      renderImageList();
      renderWorkspace();
    }

    async function saveClaim() {
      const region = currentRegionDetail();
      if (!region) return;
      const textValue = el('claim-text').value.trim() || null;
      if (!state.claimTarget && !textValue) {
        alert('Pick a target entity or enter a free text value.');
        return;
      }
      await api('/api/claims', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          subject_type: 'image_region',
          subject_id: region.id,
          predicate: el('claim-predicate').value,
          object_type: state.claimTarget?.entity_type || null,
          object_id: state.claimTarget?.entity_id || null,
          text_value: textValue,
          confidence: el('claim-confidence').value,
          status: el('claim-status').value,
          rationale: el('claim-rationale').value.trim() || null,
          evidence: [{ evidence_type: 'image_region', evidence_id: region.id }]
        })
      });
      state.draftClaimOpen = false;
      state.claimTarget = null;
      const refreshed = await loadRegionDetail(region.id);
      state.selectedRegionId = region.id;
      state.selectedRegionDetail = refreshed;
      renderImageList();
      renderWorkspace();
    }

    function setupCanvasInteractions() {
      const layer = el('region-layer');
      const scroll = el('canvas-scroll');
      layer.addEventListener('click', async (event) => {
        if (event.target !== layer || !state.selectedImage || !state.imageSize.width) return;
        if (state.mode === 'point') {
          const point = pointerToNorm(event);
          await createRegion({
            region_type: 'point',
            x_norm: point.x,
            y_norm: point.y,
            width_norm: null,
            height_norm: null,
            label: null,
            notes: null
          });
        } else if (state.mode === 'select') {
          await selectRegion(null);
        }
      });

      let dragStart = null;
      layer.addEventListener('mousedown', (event) => {
        if (state.mode !== 'box' || event.target !== layer || !state.selectedImage) return;
        dragStart = pointerToNorm(event);
        state.boxDraft = { start: dragStart, current: dragStart };
        drawDraftBox();
      });
      const startPan = (event) => {
        if (state.mode !== 'pan' || !state.selectedImage) return;
        state.panState = {
          startX: event.clientX,
          startY: event.clientY,
          panX: state.panX,
          panY: state.panY
        };
        scroll.classList.add('panning');
        event.preventDefault();
      };
      scroll.addEventListener('mousedown', startPan);
      window.addEventListener('mousemove', (event) => {
        if (!dragStart || state.mode !== 'box') return;
        state.boxDraft.current = pointerToNorm(event);
        drawDraftBox();
      });
      window.addEventListener('mousemove', (event) => {
        if (!state.panState || state.mode !== 'pan') return;
        const dx = event.clientX - state.panState.startX;
        const dy = event.clientY - state.panState.startY;
        state.panX = state.panState.panX + dx;
        state.panY = state.panState.panY + dy;
        normalizeCanvasPan();
        updateCanvasTransform();
      });
      window.addEventListener('mouseup', async () => {
        if (!dragStart || state.mode !== 'box') return;
        const start = state.boxDraft.start;
        const current = state.boxDraft.current;
        dragStart = null;
        el('draft-box').classList.add('hidden');
        const x = Math.min(start.x, current.x);
        const y = Math.min(start.y, current.y);
        const width = Math.abs(start.x - current.x);
        const height = Math.abs(start.y - current.y);
        if (width < 0.005 || height < 0.005) {
          state.boxDraft = null;
          return;
        }
        await createRegion({
          region_type: 'box',
          x_norm: x,
          y_norm: y,
          width_norm: width,
          height_norm: height,
          label: null,
          notes: null
        });
        state.boxDraft = null;
      });
      window.addEventListener('mouseup', () => {
        if (!state.panState) return;
        state.panState = null;
        scroll.classList.remove('panning');
      });

      scroll.addEventListener('wheel', (event) => {
        if (!state.selectedImage) return;
        event.preventDefault();
        const nextScale = event.deltaY < 0
          ? state.imageScale * 1.1
          : state.imageScale / 1.1;
        setScaleAroundPoint(nextScale, event.clientX, event.clientY);
      }, { passive: false });
      scroll.addEventListener('dblclick', (event) => {
        if (!state.selectedImage) return;
        event.preventDefault();
        centerCanvasOnPoint(event.clientX, event.clientY);
      });
    }

    function pointerToNorm(event) {
      const stage = el('canvas-stage');
      const rect = stage.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width;
      const y = (event.clientY - rect.top) / rect.height;
      return {
        x: Math.max(0, Math.min(1, x)),
        y: Math.max(0, Math.min(1, y))
      };
    }

    function drawDraftBox() {
      const draft = el('draft-box');
      if (!state.boxDraft || !state.imageSize.width) {
        draft.classList.add('hidden');
        return;
      }
      const x = Math.min(state.boxDraft.start.x, state.boxDraft.current.x) * state.imageSize.width;
      const y = Math.min(state.boxDraft.start.y, state.boxDraft.current.y) * state.imageSize.height;
      const width = Math.abs(state.boxDraft.start.x - state.boxDraft.current.x) * state.imageSize.width;
      const height = Math.abs(state.boxDraft.start.y - state.boxDraft.current.y) * state.imageSize.height;
      draft.classList.remove('hidden');
      draft.style.left = `${x}px`;
      draft.style.top = `${y}px`;
      draft.style.width = `${width}px`;
      draft.style.height = `${height}px`;
    }

    async function createRegion(region) {
      const payload = {
        image_id: state.selectedImageId,
        ...region
      };
      const created = await api('/api/image_regions', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (created?.id) {
        const detail = await loadRegionDetail(created.id);
        state.selectedRegionId = created.id;
        state.selectedRegionDetail = detail;
        renderImageList();
        renderWorkspace();
      }
    }

    function bindTopLevel() {
      el('api-base').value = state.apiBase;
      el('image-search').value = state.filters.q;
      el('image-type').value = state.filters.image_type;
      el('region-filter').value = state.filters.region_filter;
      if (el('link-type-filter')) el('link-type-filter').value = state.linkTypeFilter;
      if (el('claim-type-filter')) el('claim-type-filter').value = state.claimTypeFilter;
      el('api-save').addEventListener('click', () => {
        state.apiBase = apiClient.setApiBase(el('api-base').value.trim() || NHTApi.DEFAULT_API_BASE);
        loadImages().catch(handleError);
      });
      el('admin-key').addEventListener('click', () => {
        const current = apiClient.getAdminKey() || '';
        const value = prompt('Enter admin API key (blank clears):', current);
        if (value === null) return;
        apiClient.setAdminKey(value);
      });
      el('admin-local').addEventListener('change', (event) => {
        apiClient.setAdminLocal(event.target.checked);
        updateAdminLocalLabel();
      });
      el('add-images').addEventListener('click', () => {
        el('image-upload-input')?.click();
      });
      el('image-upload-input').addEventListener('change', (event) => {
        uploadImageFiles(event.target.files).catch(handleError);
      });
      el('workspace-zoom').addEventListener('input', (event) => {
        state.workspaceZoom = Number(event.target.value || 100);
        applyWorkspaceZoom();
      });
      el('refresh-all').addEventListener('click', () => loadImages().catch(handleError));
      el('image-search').addEventListener('input', debounce((event) => {
        state.filters.q = event.target.value.trim();
        loadImages().catch(handleError);
      }, 240));
      el('image-type').addEventListener('change', (event) => {
        state.filters.image_type = event.target.value;
        loadImages().catch(handleError);
      });
      el('region-filter').addEventListener('change', (event) => {
        state.filters.region_filter = event.target.value;
        loadImages().catch(handleError);
      });
      el('zoom-out').addEventListener('click', () => {
        setScaleAroundPoint(state.imageScale / 1.1);
      });
      el('zoom-in').addEventListener('click', () => {
        setScaleAroundPoint(state.imageScale * 1.1);
      });
      el('zoom-fit').addEventListener('click', () => {
        state.imageScale = fitScale();
        centerCanvasImage();
        applyStageScale();
      });
      el('zoom-reset').addEventListener('click', () => {
        state.imageScale = 1;
        centerCanvasImage();
        applyStageScale();
      });
      ['brightness', 'contrast', 'saturation', 'gamma'].forEach((key) => {
        el(`adjust-${key}`)?.addEventListener('input', (event) => {
          state.imageAdjustments[key] = Number(event.target.value || 100);
          renderAdjustmentControls();
        });
      });
      document.querySelectorAll('[data-reset-adjust]').forEach((node) => {
        node.addEventListener('click', () => {
          resetImageAdjustment(node.dataset.resetAdjust);
        });
      });
      el('adjust-reset-all').addEventListener('click', () => {
        ['brightness', 'contrast', 'saturation', 'gamma'].forEach((key) => {
          state.imageAdjustments[key] = 100;
        });
        renderAdjustmentControls();
      });
      ['prev-image', 'next-image'].forEach((id) => {
        el(id).addEventListener('mousedown', (event) => {
          event.preventDefault();
          event.stopPropagation();
        });
      });
      el('prev-image').addEventListener('click', () => navigateImage(-1).catch(handleError));
      el('next-image').addEventListener('click', () => navigateImage(1).catch(handleError));
      ['select', 'pan', 'point', 'box'].forEach((mode) => {
        el(`mode-${mode}`).addEventListener('click', () => {
          state.mode = mode;
          updateModeButtons();
        });
      });
      el('toggle-labels').addEventListener('click', () => {
        state.showRegionLabels = !state.showRegionLabels;
        renderRegions();
        updateModeButtons();
      });
      updateModeButtons();
      renderAdjustmentControls();
      updateAdminLocalLabel();
      applyWorkspaceZoom();
      setupCanvasInteractions();
      document.addEventListener('wheel', (event) => {
        if (!(event.ctrlKey || event.metaKey)) return;
        if (event.target?.closest('#canvas-scroll')) return;
        event.preventDefault();
      }, { passive: false, capture: true });
      ['gesturestart', 'gesturechange', 'gestureend'].forEach((type) => {
        document.addEventListener(type, (event) => {
          event.preventDefault();
        }, { passive: false, capture: true });
      });
      document.addEventListener('touchmove', (event) => {
        if ((event.touches?.length || 0) > 1) {
          event.preventDefault();
        }
      }, { passive: false, capture: true });
      window.addEventListener('keydown', (event) => {
        const tag = document.activeElement?.tagName?.toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select' || document.activeElement?.isContentEditable) return;
        if (event.key === 'ArrowUp') {
          event.preventDefault();
          navigateImage(-1).catch(handleError);
        } else if (event.key === 'ArrowDown') {
          event.preventDefault();
          navigateImage(1).catch(handleError);
        } else if (event.key === 'ArrowLeft') {
          event.preventDefault();
          navigateImage(-1).catch(handleError);
        } else if (event.key === 'ArrowRight') {
          event.preventDefault();
          navigateImage(1).catch(handleError);
        } else if (event.key === 'Escape' && state.selectedRegionId) {
          event.preventDefault();
          selectRegion(null).catch(handleError);
        }
      });
    }

    function updateAdminLocalLabel() {
      const checkbox = el('admin-local');
      if (checkbox) checkbox.checked = apiClient.getAdminLocal();
    }

    function debounce(fn, delay) {
      let timer = null;
      return (...args) => {
        window.clearTimeout(timer);
        timer = window.setTimeout(() => fn(...args), delay);
      };
    }

    function handleError(error) {
      console.error(error);
      const stack = el('inspector-stack');
      if (stack && state.selectedImage) {
        const msg = escapeHtml(error.message || 'Something went wrong.');
        const box = document.createElement('div');
        box.className = 'empty-state';
        box.textContent = msg;
        stack.prepend(box);
        return;
      }
      el('inspector-stack').innerHTML = `<div class="empty-state">${escapeHtml(error.message || 'Something went wrong.')}</div>`;
    }

    bindTopLevel();
    loadImages().catch(handleError);
  </script>
</body>
</html>
